<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 320" width="920" height="320" font-family="ui-sans-serif, -apple-system, Segoe UI, Helvetica, Arial, sans-serif" role="img" aria-label="tollbooth — a firewall + DLP + audit layer for AI agent tool traffic; requests are policed and blocked, results are scanned and redacted">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0E14"/>
      <stop offset="1" stop-color="#10141D"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58A6FF"/>
      <stop offset="0.55" stop-color="#56D4DD"/>
      <stop offset="1" stop-color="#3FB950"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrR" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#46505E"/>
    </marker>
  </defs>

  <!-- panel -->
  <rect x="1" y="1" width="918" height="318" rx="18" fill="url(#bg)" stroke="#1C222C" stroke-width="2"/>

  <!-- wordmark + tagline -->
  <text x="46" y="60" font-size="42" font-weight="700" letter-spacing="-1" fill="url(#mark)">tollbooth</text>
  <text x="48" y="88" font-size="15" fill="#8B949E">a firewall + DLP + audit layer for AI&#160;agent tool traffic</text>

  <!-- ============ bidirectional data-flow diagram ============ -->
  <!-- REQUEST lane (top, left→right) -->
  <line x1="196" y1="168" x2="404" y2="168" stroke="#3B434D" stroke-width="3" marker-end="url(#arrR)"/>
  <line x1="516" y1="168" x2="724" y2="168" stroke="#3B434D" stroke-width="3" marker-end="url(#arrR)"/>
  <text x="300" y="158" font-size="11" font-weight="600" fill="#6E7B8B" text-anchor="middle">requests</text>
  <!-- RESULT lane (bottom, right→left) -->
  <line x1="724" y1="202" x2="516" y2="202" stroke="#3B434D" stroke-width="3" marker-end="url(#arrR)"/>
  <line x1="404" y1="202" x2="196" y2="202" stroke="#3B434D" stroke-width="3" marker-end="url(#arrR)"/>
  <text x="620" y="222" font-size="11" font-weight="600" fill="#6E7B8B" text-anchor="middle">results</text>

  <!-- AI AGENT node -->
  <rect x="46" y="150" width="150" height="70" rx="11" fill="#0E1420" stroke="#243042" stroke-width="1.5"/>
  <text x="121" y="183" font-size="15" font-weight="600" fill="#E6EDF3" text-anchor="middle">AI AGENT</text>
  <text x="121" y="202" font-size="11" fill="#6E7B8B" text-anchor="middle">Claude Code · Cursor</text>

  <!-- MCP SERVERS node -->
  <rect x="724" y="150" width="150" height="70" rx="11" fill="#0E1420" stroke="#243042" stroke-width="1.5"/>
  <text x="799" y="183" font-size="15" font-weight="600" fill="#E6EDF3" text-anchor="middle">MCP SERVERS</text>
  <text x="799" y="202" font-size="11" fill="#6E7B8B" text-anchor="middle">fs · shell · github</text>

  <!-- ===== the gate ===== -->
  <rect x="392" y="118" width="20" height="134" rx="4" fill="#161C27" stroke="#2B3645" stroke-width="1.5"/>
  <rect x="508" y="118" width="20" height="134" rx="4" fill="#161C27" stroke="#2B3645" stroke-width="1.5"/>
  <rect x="384" y="96" width="152" height="26" rx="6" fill="#11161F" stroke="#2B3645" stroke-width="1.5"/>
  <text x="460" y="114" font-size="13" font-weight="700" letter-spacing="3" fill="#58A6FF" text-anchor="middle">GATEWAY</text>
  <text x="460" y="142" font-size="11" font-weight="600" letter-spacing="0.5" fill="#8B949E" text-anchor="middle">policy · DLP · audit</text>

  <!-- ===== packets ===== -->
  <!-- request: allowed (green, passes through) -->
  <circle r="6" cy="168" fill="#3FB950" filter="url(#glow)">
    <animate attributeName="cx" values="196;724" dur="4.6s" begin="0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.05;0.5;0.95;1" dur="4.6s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <!-- request: blocked (red, halts at the gate) -->
  <circle r="7" cy="168" fill="#F85149" filter="url(#glow)">
    <animate attributeName="cx" values="196;392;392;392" keyTimes="0;0.42;0.86;1" dur="4.6s" begin="2.0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;1;0;0" keyTimes="0;0.08;0.42;0.82;0.9;1" dur="4.6s" begin="2.0s" repeatCount="indefinite"/>
  </circle>
  <text x="392" y="173" font-size="16" font-weight="700" fill="#F85149" text-anchor="middle" opacity="0">✕
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.42;0.46;0.82;0.86;1" dur="4.6s" begin="2.0s" repeatCount="indefinite"/>
  </text>

  <!-- result: secret arrives (red), gets redacted at the gate, continues clean (green) -->
  <circle r="6" cy="202" fill="#F85149" filter="url(#glow)">
    <animate attributeName="cx" values="724;196" dur="4.6s" begin="1.0s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="#F85149;#F85149;#3FB950;#3FB950" keyTimes="0;0.46;0.56;1" dur="4.6s" begin="1.0s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.05;0.5;0.95;1" dur="4.6s" begin="1.0s" repeatCount="indefinite"/>
  </circle>
  <text x="460" y="238" font-size="11" font-weight="700" letter-spacing="0.5" fill="#56D4DD" text-anchor="middle" opacity="0">[REDACTED]
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.46;0.52;0.62;0.7;1" dur="4.6s" begin="1.0s" repeatCount="indefinite"/>
  </text>

  <!-- footer chips -->
  <g font-size="11.5" font-weight="600" fill="#8B949E">
    <text x="46" y="296">fail-closed by default</text>
    <text x="232" y="296" fill="#2B3645">•</text>
    <text x="250" y="296">secrets never logged</text>
    <text x="420" y="296" fill="#2B3645">•</text>
    <text x="438" y="296">tamper-evident audit</text>
    <text x="612" y="296" fill="#2B3645">•</text>
    <text x="630" y="296">client-agnostic MCP proxy</text>
  </g>
</svg>
