name: Publish to PyPI

# Publishes a release to PyPI via Trusted Publishing (OIDC) — no long-lived
# tokens. Fires when a version tag is pushed (e.g. `git tag v0.1.1 && git push
# --tags`). The v0.1.0 tag predates this workflow, so it is never re-published.
#
# One-time setup on PyPI (Project → Settings → Publishing → Add a trusted
# publisher), matching exactly:
#   Owner:        Realgagenichols
#   Repository:   tollbooth
#   Workflow:     release.yml
#   Environment:  pypi

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/mcp-tollbooth
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Run tests
        run: uv run pytest -q

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
