# tollbooth example config — exercises every matcher type.
#
# Layout:
#   servers:   upstream MCP servers the gateway launches and wraps
#   policy:    ordered rules (first match wins) + default + failure mode
#   audit_log: JSONL decision log (omit to log to stderr)
#
# IMPORTANT: a rule with a `where:` block can only fire when the argument
# field is PRESENT in the call. Negative matchers (not_prefix) combined with
# `default: allow` are bypassable by argument omission — pair guard rules
# with `default: deny` (as below) or add a catch-all rule.

servers:
  fs:
    command: npx
    args: ["-y", "@modelcontextprotocol/server-filesystem", "/Users/me/project"]
  shell:
    command: my-shell-mcp-server
    env:
      SHELL_TIMEOUT: "30"

policy:
  # Applied when no rule matches. `deny` = allowlist posture (recommended).
  default: deny
  # `closed` (default): an internal error blocks the call. `open`: logs and
  # continues — only set this if availability beats enforcement for you.
  failure_mode: closed

  rules:
    # equals — exact match on an argument field
    - name: allow-project-status
      action: allow
      server: shell
      tool: exec
      where:
        command:
          equals: "git status"

    # prefix — allow reads inside the project only
    - name: allow-project-reads
      action: allow
      server: fs
      tool: read_file
      where:
        path:
          prefix: /Users/me/project

    # not_prefix — deny writes that escape the project directory
    - name: block-writes-outside-project
      action: deny
      server: fs
      tool: write_file
      where:
        path:
          not_prefix: /Users/me/project

    # regex — block curl-pipe-shell patterns anywhere in a command
    - name: no-curl-pipe-sh
      action: deny
      server: shell
      tool: exec
      where:
        command:
          regex: "curl.*\\|\\s*sh"

    # require-approval — blocked with an approvable message (distinct from deny)
    - name: shell-needs-approval
      action: require-approval
      server: shell
      tool: "*"

    # wildcard allow — everything else on fs (reads, lists, ...)
    - name: allow-fs-rest
      action: allow
      server: fs

# DLP runs on every call (arguments) and result. Defaults: detections in
# requests BLOCK the call; detections in results are REDACTED in place as
# [REDACTED:pattern-id]. Override per pattern and direction below.
dlp:
  enabled: true
  overrides:
    # A leaked private key is unsalvageable context — drop the whole result.
    private-key-pem:
      results: block
    # Example: a CRM that legitimately handles phone numbers.
    # us-phone:
    #   requests: allow
    #   results: allow

# Plugins (M4): extra interceptors declared as `module:factory` import specs.
# They run AFTER the built-in policy and DLP stages, in the order listed, and
# can only tighten a verdict (a non-allow short-circuits) — never loosen one.
# Loading is fail-fast: a bad import, a factory that raises, or a name that
# collides with a built-in aborts startup. Auto-discovery is intentionally not
# supported — installing a package must not silently insert an interceptor.
#
# Uncomment to load the shipped reference prompt-injection detector. The module
# must be importable by the tollbooth process — and the installed `tollbooth`
# console script does NOT put the current directory on sys.path. Run with
# PYTHONPATH pointing at the repo root for this example
# (`PYTHONPATH=/path/to/tollbooth tollbooth run ...`), or pip-install your own
# plugin package so it imports without PYTHONPATH.
# plugins:
#   - plugin: examples.plugins.prompt_injection:create
#     settings:
#       action: annotate    # or: block

# Tamper-evident JSONL trail (M3): every event hash-chains to the previous
# one — `tollbooth audit verify` detects edits/deletions/reordering, and
# TOLLBOOTH_AUDIT_KEY (env) upgrades the chain to HMAC. `record: full`
# additionally captures post-enforcement payloads (allowed-request args,
# post-redaction results — never blocked traffic) for `tollbooth audit replay`.
audit:
  log: ./tollbooth-audit.jsonl
  record: metadata
